<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Limit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    h1 { font-size: 2rem; color: #ffc107; margin-bottom: 8px; }
    p { color: #888; margin-bottom: 24px; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 16px 48px; background: #2e7d32; color: #fff;
      border-radius: 30px; text-decoration: none; font-size: 1.2rem; font-weight: bold;
      box-shadow: 0 4px 20px rgba(46,125,50,0.4); transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .note { margin-top: 16px; color: #555; font-size: 0.8rem; max-width: 320px; }
  </style>
</head>
<body>
  <h1>Speed Limit</h1>
  <p>Контроль перевищення швидкості.<br>Сигнал після 45 секунд понад ліміт.</p>
  <a class="btn" href="https://github.com/azhurkom/speedcam-assistant/releases">Завантажити APK</a>
  <p class="note">Потрібен Android 8+ з GPS. Працює у фоні 10+ годин.</p>
</body>
</html>
