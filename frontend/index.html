<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="SpeedCam">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png" type="image/png">
  <meta name="description" content="Контроль перевищення швидкості">
  <meta name="apple-mobile-web-app-title" content="SpeedCam">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>SpeedCam - контроль швидкості</title>
</head>
<body>
  <div class="app-container">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="gps-block">
        <span id="gpsDot" class="gps-dot"></span>
        <span id="gpsText" class="gps-text">GPS</span>
      </div>
      <div class="status-block">
        <span id="statusText" class="status-text">Готовий</span>
      </div>
    </div>

    <!-- SPEED DISPLAY -->
    <div class="speed-section">
      <div class="speed-display">
        <span id="speedValue" class="speed-value">--</span>
        <span class="speed-unit">км/год</span>
      </div>
    </div>

    <!-- SPEED LIMIT CONTROLS -->
    <div class="limit-section">
      <button id="limitMinus" class="limit-btn">−</button>
      <div class="limit-display">
        <span class="limit-label">Ліміт</span>
        <span id="limitValue" class="limit-value">80</span>
        <span class="limit-unit">км/год</span>
      </div>
      <button id="limitPlus" class="limit-btn">+</button>
    </div>

    <!-- EXCEED TIMER -->
    <div id="timerSection" class="timer-section">
      <div id="timerTrack" class="timer-track">
        <div id="timerFill" class="timer-fill"></div>
      </div>
      <div id="timerLabel" class="timer-label">0 / 30 с</div>
      <div id="sirenAlert" class="siren-alert">
        <span>⚠ ПЕРЕВИЩЕННЯ ШВИДКОСТІ!</span>
      </div>
    </div>

    <!-- START / STOP -->
    <div class="controls-section">
      <button id="btnStartStop" class="btn-startstop">СТАРТ</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
